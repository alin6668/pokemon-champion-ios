name: Build goios for iOS

on:
  workflow_dispatch:   # 手动触发
  push:
    paths:
      - 'goios-ondevice/**'

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Install ldid (for pseudo-signing)
        run: brew install ldid

      - name: Download dependencies
        working-directory: goios-ondevice
        run: go mod download

      - name: Build for iOS arm64
        working-directory: goios-ondevice
        run: |
          SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)
          echo "iOS SDK: $SDK_PATH"
          export CGO_ENABLED=1
          export GOOS=ios
          export GOARCH=arm64
          export CGO_CFLAGS="-isysroot $SDK_PATH -miphoneos-version-min=12.0 -arch arm64"
          export CGO_LDFLAGS="-isysroot $SDK_PATH -miphoneos-version-min=12.0 -arch arm64"
          go build -ldflags="-s -w" -o goios .
          echo "=== Binary info ==="
          file goios
          ls -lh goios
          echo "=== Linked dylibs ==="
          otool -L goios || true

      - name: Pseudo-sign with ldid
        working-directory: goios-ondevice
        run: |
          ldid -S goios
          echo "=== Signature ==="
          ldid -e goios 2>&1 || echo "(entitlements check done)"

      - name: Upload artifact (iOS)
        uses: actions/upload-artifact@v4
        with:
          name: goios-ios-arm64
          path: goios-ondevice/goios
          retention-days: 90


